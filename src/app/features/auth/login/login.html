<div class="relative min-h-screen flex items-center justify-center overflow-hidden">

  <!-- FONDO --> 
  <div class="absolute inset-0 bg-cover bg-center"
     style="background-image: url('assets/images/bg-dulces.png');">
  </div>

  <div class="absolute inset-0 bg-white/60 opacity-30"></div>  

  <!-- CARD -->
  <div class="relative bg-white/90 backdrop-blur-md p-8 rounded-2xl shadow-xl w-96">

    <h2 class="text-2xl font-bold text-center mb-2 text-gray-700">
      DulcesERP 🍰
    </h2>

    <p class="text-center text-sm text-gray-400 mb-6">
      Endulza tu gestión
    </p>

    <input [(ngModel)]="email" placeholder="Correo"
      class="w-full mb-4 p-3 border rounded-lg focus:ring-2 focus:ring-pink-400" />

    <input [(ngModel)]="password" type="password" placeholder="Contraseña"
      class="w-full mb-6 p-3 border rounded-lg focus:ring-2 focus:ring-pink-400" />

    <button (click)="login()"
      class="w-full bg-pink-500 text-white p-3 rounded-lg hover:bg-pink-600">
      Ingresar
    </button>

  </div>

</div>
