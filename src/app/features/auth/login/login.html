<div class="min-h-screen flex items-center justify-center bg-gray-100">

  <div class="bg-white p-8 rounded-2xl shadow-lg w-96">

    <h2 class="text-2xl font-bold text-center mb-6">
      DulcesERP 🍰
    </h2>

    <input
      [(ngModel)]="email"
      placeholder="Correo"
      class="w-full mb-4 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <input
      [(ngModel)]="password"
      type="password"
      placeholder="Contraseña"
      class="w-full mb-6 p-3 border rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-500"
    />

    <button
      (click)="login()"
      class="w-full bg-blue-600 text-white p-3 rounded-lg hover:bg-blue-700 transition"
    >
      Ingresar
    </button>

  </div>

</div>
